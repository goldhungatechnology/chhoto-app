services:
  db_dev:
    extends:
      file: docker-compose.base.yml
      service: db
    container_name: chhoto_db_dev
    env_file:
      - ../apps/backend/env/.env.development
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis_dev:
    extends:
      file: docker-compose.base.yml
      service: redis
    container_name: chhoto_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  backend:
    extends:
      file: docker-compose.base.yml
      service: backend
    container_name: chhoto_backend_dev
    env_file:
      - ../apps/backend/env/.env.development
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend:/app
    depends_on:
      db_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
    command: uv run uvicorn src.main:create_app --host 0.0.0.0 --port 8000 --reload --factory

  background_worker:
    extends:
      file: docker-compose.base.yml
      service: background_worker
    container_name: chhoto_worker_dev
    env_file:
      - ../apps/backend/env/.env.development
    volumes:
      - ../apps/backend:/app
    depends_on:
      db_dev:
        condition: service_healthy
      redis_dev:
        condition: service_healthy
    command: uv run dramatiq src.shared.infrastructure.tasks.registry

  frontend:
    extends:
      file: docker-compose.base.yml
      service: frontend
    container_name: chhoto_frontend_dev
    env_file:
      - ../apps/frontend/.env.local
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_dev_data:
  redis_dev_data:
