version: '3.8'

services:
  db_dev:
    extends:
      file: docker-compose.base.yml
      service: db
    container_name: chhoto_db_dev
    environment:
      - POSTGRES_DB=chhoto_db_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis_dev:
    extends:
      file: docker-compose.base.yml
      service: redis
    container_name: chhoto_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  backend:
    extends:
      file: docker-compose.base.yml
      service: backend
    container_name: chhoto_backend_dev
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db_dev:5432/chhoto_db_dev
      - REDIS_URL=redis://redis_dev:6379/0
      - AUDIT_ENABLED=True
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend:/app
    depends_on:
      - db_dev
      - redis_dev
    command: uvicorn src.main:create_app --host 0.0.0.0 --port 8000 --reload --factory

  frontend:
    extends:
      file: docker-compose.base.yml
      service: frontend
    container_name: chhoto_frontend_dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_dev_data:
  redis_dev_data:
