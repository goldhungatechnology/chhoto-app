services:
  db:
    image: postgres:15-alpine
    networks:
      - chhoto_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - chhoto_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    image: chhoto-backend:latest
    networks:
      - chhoto_network
    restart: unless-stopped

  background_worker:
    image: chhoto-backend:latest
    networks:
      - chhoto_network
    restart: unless-stopped

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    networks:
      - chhoto_network
    restart: unless-stopped

networks:
  chhoto_network:
    name: chhoto_network
    driver: bridge
