app.chhoto.tech {

	# Redirect auth routes to the auth domain
	redir /auth* https://auth.chhoto.tech{uri} 302

	reverse_proxy localhost:3000
}

# Authentication domain
auth.chhoto.tech {

	# Redirect app routes to the main app domain
	@app_routes {
		path /dashboard* /links* /profile* /analytics* /settings*
	}
	redir @app_routes https://app.chhoto.tech{uri} 302

	# Don't rewrite Next.js assets
	@next path /_next/*
	handle @next {
		reverse_proxy localhost:3000
	}

	# Don't rewrite common static files
	@static {
		path /favicon.ico
		path /robots.txt
		path /sitemap.xml
		path /manifest.json
		path /apple-touch-icon.png
		path /assets/*
	}

	handle @static {
		reverse_proxy localhost:3000
	}

	@alreadyAuth path /auth*
	handle @alreadyAuth {
		reverse_proxy localhost:3000
	    }

	# Rewrite everything else to /auth/*
	handle {
		rewrite * /auth{uri}
		reverse_proxy localhost:3000
	}
}

go.chhoto.tech {
    rewrite * /api/v1/link/redirect{uri}
    reverse_proxy localhost:8000
}

api.chhoto.tech {
    reverse_proxy localhost:8000
}
