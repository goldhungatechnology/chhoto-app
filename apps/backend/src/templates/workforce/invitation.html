<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You've been invited</title>
  </head>
  <body>
    <p>Hi,</p>
    <p>You've been invited to join <strong>{{ organization_name }}</strong> on Chatboq.</p>
    <p>Click the link below to accept the invitation. This link expires on {{ expires_at }}.</p>
    <p><a href="{{ invite_link }}">{{ invite_link }}</a></p>
    <p>If you didn't expect this invitation, you can safely ignore this email.</p>
  </body>
</html>
