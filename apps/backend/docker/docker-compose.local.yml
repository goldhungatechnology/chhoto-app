services:
  postgres:
    env_file:
      - "../env/.env.local"
    environment:
      ENVIRONMENT: "local"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    env_file:
      - "../env/.env.local"
    environment:
      ENVIRONMENT: "local"
    ports:
      - "6379:6379"

  backend:
    env_file:
      - "../env/.env.local"
    volumes:
      - ../src:/app/src
      - ../alembic.ini:/app/alembic.ini
      - ../migrations:/app/migrations
      - app_logs:/logs
    command:
      [
        "uvicorn",
        "src.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/src"
      ]
    environment:
      ENVIRONMENT: "local"
    ports:
      - "8080:8000"
