services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${POSTGRES_DB:-chhoto_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build: ../
    image: ${PROJECT_NAME:-chhoto-backend}_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    environment:
      LOG_FILE_PATH: /logs/backend.log
    volumes:
      - app_logs:/logs
    networks:
      - app-network

networks:
  app-network:
    name: ${PROJECT_NAME:-chhoto-backend}-network
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  app_logs:
